name: Test

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx biome check .

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Coverage
        run: npm run coverage

      - name: Build
        run: npm run build

      - name: Generate API docs
        run: npm run docs

      - name: Publish API docs to wiki
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # GitHub wikis are a separate git repo. The wiki must be initialized
          # once (create any page in the UI) before .wiki.git exists.
          git clone --depth 1 \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git" wiki
          rm -rf wiki/*
          cp -r docs/api/. wiki/
          # The wiki landing page must be named Home.md.
          if [ -f wiki/README.md ]; then mv wiki/README.md wiki/Home.md; fi
          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "docs: sync API reference [skip ci]"
          git push
